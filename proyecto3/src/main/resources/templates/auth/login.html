<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesion | E-Commerce UTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a6496 0%, #2980b9 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.25); }
        .login-header { background: linear-gradient(135deg, #1a6496, #2980b9); color: white; border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
        .btn-login { background: #1a6496; border: none; padding: .75rem; font-size: 1rem; border-radius: 8px; }
        .btn-login:hover { background: #154f74; }
        .form-control:focus { border-color: #2980b9; box-shadow: 0 0 0 .2rem rgba(41,128,185,.25); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card">
                <div class="login-header">
                    <i class="fas fa-store fa-3x mb-3"></i>
                    <h4 class="mb-0">E-Commerce UTS</h4>
                    <small>Iniciar Sesion</small>
                </div>
                <div class="card-body p-4">

                    <!-- Mensajes -->
                    <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span th:text="${errorMsg}"></span>
                    </div>
                    <div th:if="${logoutMsg}" class="alert alert-success d-flex align-items-center" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${logoutMsg}"></span>
                    </div>
                    <div th:if="${successMsg}" class="alert alert-success">
                        <span th:text="${successMsg}"></span>
                    </div>

                    <!-- Formulario de login -->
                    <!-- Spring Security intercepta POST /login automaticamente -->
                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">
                                <i class="fas fa-envelope me-1"></i>Email
                            </label>
                            <input type="email" id="email" name="email"
                                   class="form-control form-control-lg"
                                   placeholder="tu@email.com" required autofocus/>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">
                                <i class="fas fa-lock me-1"></i>Contrasena
                            </label>
                            <input type="password" id="password" name="password"
                                   class="form-control form-control-lg"
                                   placeholder="••••••••" required/>
                        </div>

                        <div class="mb-3 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="remember-me" id="remember"/>
                                <label class="form-check-label" for="remember">Recordarme</label>
                            </div>
                        </div>

                        <!-- Token CSRF generado automaticamente por Thymeleaf + Spring Security -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-login btn-primary text-white fw-bold">
                                <i class="fas fa-sign-in-alt me-2"></i>Ingresar
                            </button>
                        </div>
                    </form>

                    <hr class="my-3"/>
                    <p class="text-center mb-0 text-muted small">
                        ¿No tienes cuenta?
                        <a th:href="@{/registro}" class="fw-bold">Registrate aqui</a>
                    </p>
                </div>
            </div>

            <!-- Credenciales de prueba -->
            <div class="card mt-3 bg-white bg-opacity-90">
                <div class="card-body py-2 px-3">
                    <p class="mb-1 small text-muted"><strong>Credenciales de prueba:</strong></p>
                    <p class="mb-0 small"><i class="fas fa-shield-alt text-danger me-1"></i><strong>Admin:</strong> admin@uts.edu.co / admin123</p>
                    <p class="mb-0 small"><i class="fas fa-user text-success me-1"></i><strong>Cliente:</strong> jaider@uts.edu.co / cliente123</p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
