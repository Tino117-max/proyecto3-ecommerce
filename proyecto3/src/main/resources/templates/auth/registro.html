<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro | E-Commerce UTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a6496 0%, #2980b9 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
        .card-header { background: linear-gradient(135deg, #1a6496, #2980b9); color: white; border-radius: 16px 16px 0 0 !important; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card">
                <div class="card-header text-center py-3">
                    <i class="fas fa-user-plus fa-2x mb-2"></i>
                    <h5 class="mb-0">Crear Cuenta</h5>
                </div>
                <div class="card-body p-4">

                    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                    <form th:action="@{/registro}" th:object="${usuario}" method="post" novalidate>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre completo</label>
                            <input type="text" th:field="*{nombre}" class="form-control"
                                   placeholder="Tu nombre" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('nombre')}"
                                 th:errors="*{nombre}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" th:field="*{email}" class="form-control"
                                   placeholder="tu@email.com" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contrasena</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   placeholder="Minimo 6 caracteres" required/>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Confirmar contrasena</label>
                            <input type="password" name="confirmPassword" class="form-control"
                                   placeholder="Repite tu contrasena" required/>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary py-2 fw-bold">
                                <i class="fas fa-user-plus me-2"></i>Crear Cuenta
                            </button>
                        </div>
                    </form>

                    <hr/>
                    <p class="text-center mb-0 small text-muted">
                        ¿Ya tienes cuenta? <a th:href="@{/login}" class="fw-bold">Inicia sesion</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
