<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mi Area | E-Commerce UTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #f8f9fa; }
        .hero { background: linear-gradient(135deg, #1a6496, #2980b9); color: white; padding: 3rem 0; }
        .product-card { transition: transform .2s; border: none; border-radius: 12px; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
        .product-img { height: 200px; object-fit: cover; background: #e9ecef; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #adb5bd; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/}">
            <i class="fas fa-store me-2"></i>E-Commerce UTS
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-muted small">
                <i class="fas fa-user-circle me-1"></i>
                Hola, <strong th:text="${usuario?.nombre ?: emailUsuario}"></strong>
                <span class="badge bg-success ms-1">CLIENTE</span>
            </span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button class="btn btn-outline-danger btn-sm">
                    <i class="fas fa-sign-out-alt me-1"></i>Salir
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="hero">
    <div class="container text-center">
        <h2 class="fw-bold">Bienvenido a la Tienda</h2>
        <p class="opacity-75">Explora nuestro catalogo de productos</p>
    </div>
</div>

<!-- Productos -->
<div class="container py-4">
    <h5 class="fw-bold mb-3"><i class="fas fa-th-large me-2 text-primary"></i>Productos Disponibles</h5>
    <div class="row g-3">
        <div class="col-md-4 col-lg-3" th:each="p : ${productos}">
            <div class="card product-card shadow-sm h-100">
                <div class="product-img"><i class="fas fa-box"></i></div>
                <div class="card-body">
                    <h6 class="fw-bold" th:text="${p.nombre}"></h6>
                    <p class="text-muted small" th:text="${p.descripcion}"></p>
                    <div class="d-flex justify-content-between align-items-center mt-auto">
                        <span class="fw-bold text-primary">
                            $<span th:text="${#numbers.formatDecimal(p.precio, 1, 'COMMA', 0, 'POINT')}"></span>
                        </span>
                        <span class="badge" th:class="${p.stock > 0} ? 'badge bg-success' : 'badge bg-danger'"
                              th:text="${p.stock > 0} ? 'En stock' : 'Agotado'"></span>
                    </div>
                    <button class="btn btn-primary w-100 mt-2 btn-sm">
                        <i class="fas fa-cart-plus me-1"></i>Agregar
                    </button>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(productos)}">
            <div class="alert alert-info">No hay productos disponibles por el momento.</div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>Proyecto3 E-Commerce &copy; 2025 | Jaider Javier Jaimes | UTS</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
