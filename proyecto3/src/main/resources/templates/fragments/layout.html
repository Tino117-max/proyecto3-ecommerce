<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:fragment="title">Proyecto3 E-Commerce UTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --primary: #1a6496; --secondary: #2980b9; }
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; color: var(--primary) !important; }
        .btn-primary { background-color: var(--primary); border-color: var(--primary); }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); border-radius: 10px; }
        .badge-admin { background: #e74c3c; }
        .badge-cliente { background: #27ae60; }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="fas fa-store me-2"></i>E-Commerce UTS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalogo}">
                        <i class="fas fa-th-large me-1"></i>Catalogo
                    </a>
                </li>
                <!-- Solo ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-danger fw-bold" th:href="@{/admin/dashboard}">
                        <i class="fas fa-cog me-1"></i>Admin
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <!-- No autenticado -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="fas fa-sign-in-alt me-1"></i>Ingresar
                    </a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-primary btn-sm ms-2" th:href="@{/registro}">Registrarse</a>
                </li>
                <!-- Autenticado -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-1"></i>
                        <span sec:authentication="name"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item" th:href="@{/admin/dashboard}">
                                <i class="fas fa-tachometer-alt me-2"></i>Dashboard Admin
                            </a>
                        </li>
                        <li sec:authorize="hasRole('CLIENTE')">
                            <a class="dropdown-item" th:href="@{/cliente/home}">
                                <i class="fas fa-home me-2"></i>Mi Area
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesion
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- FOOTER -->
<footer th:fragment="footer" class="bg-dark text-white text-center py-3 mt-5">
    <small>Proyecto3 E-Commerce &copy; 2025 | Jaider Javier Jaimes | Ingenieria de Sistemas - UTS</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
