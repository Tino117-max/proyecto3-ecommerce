<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Usuarios | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>body { background: #f0f2f5; } .sidebar { background: #1a6496; min-height: 100vh; padding-top: 1rem; } .sidebar a { color: rgba(255,255,255,.85); text-decoration: none; padding: .6rem 1rem; display: block; border-radius: 8px; margin: 2px 8px; } .sidebar a:hover { background: rgba(255,255,255,.2); }</style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar col-md-2">
        <div class="text-white text-center py-3 border-bottom border-white border-opacity-25 mb-2">
            <i class="fas fa-store fa-2x"></i><div class="small mt-1">Admin Panel</div>
        </div>
        <a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
        <a th:href="@{/admin/productos}"><i class="fas fa-box me-2"></i>Productos</a>
        <a th:href="@{/admin/usuarios}" style="background:rgba(255,255,255,.2)"><i class="fas fa-users me-2"></i>Usuarios</a>
        <hr class="text-white opacity-25"/>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-link text-white-50 w-100 text-start ps-3"><i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesion</button>
        </form>
    </div>
    <div class="flex-grow-1 p-4">
        <h4 class="fw-bold mb-4"><i class="fas fa-users me-2 text-primary"></i>Usuarios Registrados</h4>
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr><th>#</th><th>Nombre</th><th>Email</th><th>Roles</th><th>Estado</th><th>Registro</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <td th:text="${u.id}"></td>
                            <td th:text="${u.nombre}"></td>
                            <td th:text="${u.email}"></td>
                            <td>
                                <span th:each="rol : ${u.roles}"
                                      th:text="${rol.nombre}"
                                      th:class="${rol.nombre == 'ROLE_ADMIN'} ? 'badge bg-danger me-1' : 'badge bg-success me-1'">
                                </span>
                            </td>
                            <td><span th:text="${u.activo} ? 'Activo' : 'Inactivo'" th:class="${u.activo} ? 'badge bg-success' : 'badge bg-secondary'"></span></td>
                            <td><small th:text="${u.createdAt != null} ? ${#temporals.format(u.createdAt, 'dd/MM/yyyy')} : '-'"></small></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
