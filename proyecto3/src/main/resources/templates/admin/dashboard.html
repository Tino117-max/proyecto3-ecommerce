<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard Admin | E-Commerce UTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .sidebar { background: #1a6496; min-height: 100vh; padding-top: 1rem; }
        .sidebar a { color: rgba(255,255,255,.85); text-decoration: none; padding: .6rem 1rem; display: block; border-radius: 8px; margin: 2px 8px; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,.2); color: white; }
        .stat-card { border-radius: 12px; padding: 1.5rem; color: white; }
        .stat-card.blue { background: linear-gradient(135deg, #1a6496, #2980b9); }
        .stat-card.green { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .stat-card.orange { background: linear-gradient(135deg, #e67e22, #f39c12); }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar col-md-2">
        <div class="text-white text-center py-3 border-bottom border-white border-opacity-25 mb-2">
            <i class="fas fa-store fa-2x"></i>
            <div class="small mt-1">Admin Panel</div>
        </div>
        <a th:href="@{/admin/dashboard}" class="active">
            <i class="fas fa-tachometer-alt me-2"></i>Dashboard
        </a>
        <a th:href="@{/admin/productos}">
            <i class="fas fa-box me-2"></i>Productos
        </a>
        <a th:href="@{/admin/usuarios}">
            <i class="fas fa-users me-2"></i>Usuarios
        </a>
        <a th:href="@{/catalogo}">
            <i class="fas fa-store me-2"></i>Ver Tienda
        </a>
        <hr class="text-white opacity-25"/>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-link text-white-50 w-100 text-start ps-3">
                <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesion
            </button>
        </form>
    </div>

    <!-- Contenido -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold text-dark mb-0">
                <i class="fas fa-tachometer-alt me-2 text-primary"></i>Dashboard
            </h4>
            <span class="badge bg-danger">
                <i class="fas fa-shield-alt me-1"></i>
                ADMIN: <span sec:authentication="name"></span>
            </span>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="stat-card blue">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small opacity-75">Total Productos</div>
                            <div class="fs-2 fw-bold" th:text="${totalProductos}">0</div>
                        </div>
                        <i class="fas fa-box fa-2x opacity-75"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card green">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small opacity-75">Total Usuarios</div>
                            <div class="fs-2 fw-bold" th:text="${totalUsuarios}">0</div>
                        </div>
                        <i class="fas fa-users fa-2x opacity-75"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card orange">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small opacity-75">Estado Sistema</div>
                            <div class="fs-5 fw-bold">Activo</div>
                        </div>
                        <i class="fas fa-check-circle fa-2x opacity-75"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Acciones rapidas -->
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-bold">
                <i class="fas fa-bolt me-2 text-warning"></i>Acciones Rapidas
            </div>
            <div class="card-body">
                <a th:href="@{/admin/productos/nuevo}" class="btn btn-primary me-2">
                    <i class="fas fa-plus me-1"></i>Nuevo Producto
                </a>
                <a th:href="@{/admin/productos}" class="btn btn-outline-primary me-2">
                    <i class="fas fa-box me-1"></i>Ver Productos
                </a>
                <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary">
                    <i class="fas fa-users me-1"></i>Ver Usuarios
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
