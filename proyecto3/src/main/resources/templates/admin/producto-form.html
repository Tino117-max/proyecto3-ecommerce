<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Producto | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="fas fa-box me-2"></i>
                        <span th:text="${producto.id != null} ? 'Editar Producto' : 'Nuevo Producto'"></span>
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{activo}"/>
                        <input type="hidden" th:field="*{createdAt}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre del Producto</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Descripcion</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Precio (COP)</label>
                                <input type="number" th:field="*{precio}" class="form-control" step="0.01" min="0" required/>
                                <div class="text-danger small" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Stock</label>
                                <input type="number" th:field="*{stock}" class="form-control" min="0" required/>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">URL de la Imagen</label>
                            <input type="text" th:field="*{imagenUrl}" class="form-control" placeholder="/img/producto.jpg"/>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Guardar
                            </button>
                            <a th:href="@{/admin/productos}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
